<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <!-- P3+P9: favicon بدون خلفية بيضاء، مع cache-busting -->
    <link rel="icon" type="image/png" href="/favicon.png?v=2.6.4" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=2.6.4" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Vodafone Fakka Premium</title>
    <!-- P8+P9: PWA theme black — prevents white flash -->
    <meta name="theme-color" content="#000000" />
    <meta name="background-color" content="#000000" />
    <meta name="msapplication-TileColor" content="#000000" />
    <meta name="msapplication-TileImage" content="/icons/icon-144x144.png?v=2.6.4" />
    <!-- ══ CRITICAL: منع الشاشة البيضاء قبل React — يُظهر الخلفية السوداء فوراً ══ -->
    <style>
      html, body, #root {
        background: #050000 !important;
        background-color: #050000 !important;
        margin: 0; padding: 0;
        min-height: 100dvh;
        -webkit-tap-highlight-color: transparent;
      }
      /* Inline loading indicator — يظهر قبل React بالكامل */
      #boot-loader {
        position: fixed; inset: 0; z-index: 99999;
        background: #050000;
        display: flex; align-items: center; justify-content: center;
        transition: opacity 0.3s ease;
      }
      #boot-loader.hidden { opacity: 0; pointer-events: none; }
      @keyframes bl-pulse {
        0% { transform: scale(0.9); opacity: 0.8; }
        50% { transform: scale(1.1); opacity: 1; }
        100% { transform: scale(0.9); opacity: 0.8; }
      }
    </style>
    <!-- P3: Web Manifest link -->
    <link rel="manifest" href="/manifest.json?v=2.6.4" />
    <!-- ── حماية أمنية: Security Headers ──────────────────────────────── -->
    <!-- منع تضمين التطبيق في iframe خارجي (Clickjacking) -->
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <!-- منع تخزين الصفحات الحساسة في Cache الوسيط -->
    <meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
    <!-- منع MIME type sniffing -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <!-- الإحالات: لا ترسل معلومات Referer للخوادم الخارجية -->
    <meta name="referrer" content="no-referrer" />
    <!-- CSP: مصادر موثوقة فقط -->
    <meta http-equiv="Content-Security-Policy"
      content="
        default-src 'self' https://vchmsnavyhripakyvzom.supabase.co;
        script-src 'self' 'unsafe-inline' 'unsafe-eval';
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com;
        img-src 'self' data: blob: https://vchmsnavyhripakyvzom.supabase.co https://*.supabase.co https://miaoda-conversation-file.s3cdn.medo.dev https://*.medo.dev;
        connect-src 'self' https://vchmsnavyhripakyvzom.supabase.co wss://vchmsnavyhripakyvzom.supabase.co https://fcm.googleapis.com;
        frame-ancestors 'none';
        base-uri 'self';
        form-action 'self';
      " />
    <!-- ────────────────────────────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  </head>
  <body style="background:#050000;margin:0;padding:0;">
    <!-- boot-loader: يظهر فوراً قبل React — يمنع الشاشة السوداء الفارغة -->
    <div id="boot-loader">
      <img src="/vfp-logo.png" alt="Vodafone Fakka Premium" style="width: 120px; height: 120px; animation: bl-pulse 2s infinite ease-in-out;" />
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
